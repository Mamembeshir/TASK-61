[pytest]
DJANGO_SETTINGS_MODULE = harborops.settings

# Discover tests only from the top-level tests/ tree
testpaths = tests

python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Short tracebacks by default; override with -v / --tb=long on the CLI
addopts = --tb=short

# Custom markers (registered in conftest.py to suppress warnings)
markers =
    unit: Pure unit / model-layer tests. Real DB; no HTTP stack.
    api:  API integration tests. Real DB + full DRF HTTP stack.
