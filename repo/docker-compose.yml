version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # MySQL 8.0
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-harborops}
      MYSQL_USER: ${DB_USER:-harborops}
      MYSQL_PASSWORD: ${DB_PASSWORD:-harborops}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis (Celery broker)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Django application server
  # ---------------------------------------------------------------------------
  django:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: harborops.settings
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost 127.0.0.1 django}
      DB_NAME: ${DB_NAME:-harborops}
      DB_USER: ${DB_USER:-harborops}
      DB_PASSWORD: ${DB_PASSWORD:-harborops}
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      # Optional in dev/CI — settings.py falls back to a built-in dev key when DEBUG=True.
      # Always set this to a real value in production.
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
      UPLOAD_ROOT: /var/harborops/uploads/
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/var/harborops/uploads/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app

  # ---------------------------------------------------------------------------
  # Celery worker
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile
    restart: unless-stopped
    entrypoint: []
    command: celery -A harborops worker --loglevel=info --concurrency=2
    environment:
      DJANGO_SETTINGS_MODULE: harborops.settings
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      DB_NAME: ${DB_NAME:-harborops}
      DB_USER: ${DB_USER:-harborops}
      DB_PASSWORD: ${DB_PASSWORD:-harborops}
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-}
    volumes:
      - ./backend:/app
      - uploads:/var/harborops/uploads/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app

  # ---------------------------------------------------------------------------
  # Celery beat scheduler
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile
    restart: unless-stopped
    entrypoint: []
    command: celery -A harborops beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: harborops.settings
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      DB_NAME: ${DB_NAME:-harborops}
      DB_USER: ${DB_USER:-harborops}
      DB_PASSWORD: ${DB_PASSWORD:-harborops}
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app

  # ---------------------------------------------------------------------------
  # React frontend (Vite dev server)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules        # keep container node_modules isolated
    environment:
      VITE_API_TARGET: http://django:8000
    depends_on:
      - django

  # ---------------------------------------------------------------------------
  # Playwright E2E (docker compose run --rm playwright)
  # Uses node:20-slim (~70 MB) instead of the 1.8 GB playwright image.
  # Chromium binary is cached in a named volume so it only downloads once.
  # The wait loop inside the command polls frontend:5173 before running tests,
  # so there is no healthcheck dependency that can fail prematurely.
  # ---------------------------------------------------------------------------
  # Thin nginx proxy for E2E — rewrites Host: frontend → Host: localhost
  # so Vite's host-validation check (added in 5.3.x) never blocks requests.
  nginx-e2e:
    image: nginx:alpine
    volumes:
      - ./docker/nginx-e2e.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
    profiles:
      - e2e

  playwright:
    build:
      context: .
      dockerfile: docker/Dockerfile.playwright
    working_dir: /app
    volumes:
      - ./frontend/tests/e2e:/app/tests/e2e:ro
      - ./frontend/playwright.config.ts:/app/playwright.config.ts:ro
      - ./frontend/test-results:/app/test-results
      - playwright_cache:/root/.cache/ms-playwright
    command: >
      sh -c "
        npx playwright install chromium &&
        echo 'Waiting for app...' &&
        until node -e \"
          const h = require('http');
          h.get('http://nginx-e2e', r => process.exit(r.statusCode < 500 ? 0 : 1))
           .on('error', () => process.exit(1));
        \" 2>/dev/null; do
          echo '  not ready, retrying in 3s...';
          sleep 3;
        done &&
        echo 'App ready — running tests' &&
        npx playwright test
      "
    environment:
      BASE_URL: http://nginx-e2e
      CI: "true"
    depends_on:
      - nginx-e2e
    profiles:
      - e2e


volumes:
  mysql_data:
  redis_data:
  uploads:
  playwright_cache:  # Chromium binary — downloaded once, reused across runs
